services:
  - type: web
    name: detectdata
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: EDS Data Platform
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: DETECTDATA_BASE_URL
        value: https://www.detecdata-en.com
      - key: DETECTDATA_LOGIN_PATH
        value: /
      - key: DETECTDATA_USERNAME
        sync: false
      - key: DETECTDATA_PASSWORD
        sync: false
