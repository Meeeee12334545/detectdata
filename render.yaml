services:
  - type: web
    name: detectdata
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: detectdata-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: EDS Data Platform
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: DETECTDATA_BASE_URL
        value: https://www.detecdata-en.com
      - key: DETECTDATA_LOGIN_PATH
        value: /
      - key: DETECTDATA_USERNAME
        sync: false
      - key: DETECTDATA_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://detectdata-frontend.onrender.com
      - key: CORS_ORIGINS
        value: '["https://detectdata-frontend.onrender.com"]'

  - type: web
    name: detectdata-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    healthCheckPath: /
    envVars:
      - key: VITE_API_BASE
        value: https://detectdata.onrender.com/api/v1

databases:
  - name: detectdata-db
    databaseName: eds
    user: eds
    plan: free
