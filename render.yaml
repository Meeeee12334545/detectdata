services:
  - type: web
    name: detectdata-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: detectdata-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PROJECT_NAME
        value: EDS Data Platform
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: DETECTDATA_BASE_URL
        value: https://www.detecdata-en.com
      - key: DETECTDATA_LOGIN_PATH
        value: /
      - key: DETECTDATA_USERNAME
        sync: false
      - key: DETECTDATA_PASSWORD
        sync: false

  - type: web
    name: detectdata-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set VITE_API_BASE to your backend URL + /api/v1
      # e.g. https://detectdata-backend.onrender.com/api/v1
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: detectdata-db
    databaseName: eds
    user: eds
    plan: free
