services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: eds
      POSTGRES_PASSWORD: eds
      POSTGRES_DB: eds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eds -d eds"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://eds:eds@db:5432/eds
      SECRET_KEY: change-this-secret
      SCHEDULER_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
